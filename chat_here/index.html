<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Here</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="im-app" id="im-app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="user-avatar">M</div>
          <button class="create-btn" id="create-btn" title="创建群聊">+</button>
        </div>

        <div class="session-list" id="session-list"></div>
        
        <div class="contacts-section">
          <div class="contacts-header">联系人</div>
          <div class="contacts-list" id="contacts-list">
            <div class="contact-item" data-id="codex">
              <div class="contact-avatar codex">C</div>
              <div class="contact-name">Codex</div>
            </div>
            <div class="contact-item" data-id="copilot">
              <div class="contact-avatar copilot">P</div>
              <div class="contact-name">Copilot</div>
            </div>
          </div>
        </div>
      </aside>

      <section class="chat-area" id="chat-area">
        <header class="chat-header">
          <span class="header-title" id="header-title">Chat Here</span>
          <div class="header-right">
            <button class="header-btn" id="show-config">⚙</button>
          </div>
        </header>

        <div class="chat-messages" id="chat-messages"></div>

        <footer class="chat-input">
          <div class="config-panel hidden" id="config-panel">
            <select id="model-input"></select>
            <select id="copilot-model-input"></select>
            <input id="round-input" type="number" min="1" max="5" value="1" />
            <button id="codex-auth-btn">Codex认证</button>
            <button id="copilot-auth-btn">Copilot认证</button>
            <span id="provider-health"></span>
          </div>
          <div class="input-box">
            <textarea id="message-input" placeholder="发送消息..." rows="1"></textarea>
            <button class="send-btn" id="send-btn">发送</button>
          </div>
        </footer>
      </section>

      <aside class="detail-panel hidden" id="detail-panel">
        <header class="detail-header">
          <span class="detail-title">详情</span>
          <button class="detail-close" id="detail-close">×</button>
        </header>
        
        <section class="detail-section">
          <h3>会话成员</h3>
          <div class="member-info-box" id="member-info-box"></div>
          <button class="dissolve-btn" id="dissolve-btn">删除会话</button>
        </section>

        <section class="detail-section" id="progress-section">
          <h3>运行进度</h3>
          <div class="progress-list">
            <div class="progress-item" id="progress-dispatch">
              <span class="progress-dot"></span>
              <span class="progress-status">等待</span>
            </div>
            <div class="progress-item" id="progress-review">
              <span class="progress-dot"></span>
              <span class="progress-status">等待</span>
            </div>
            <div class="progress-item" id="progress-decision">
              <span class="progress-dot"></span>
              <span class="progress-status">等待</span>
            </div>
          </div>
          <div class="summary-box" id="summary-box"></div>
        </section>

        <section class="detail-section">
          <h3>历史记录</h3>
          <div class="history-list" id="history-list"></div>
        </section>
      </aside>

      <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal-box">
          <div class="modal-header">
            <span class="modal-title">创建群聊</span>
            <button class="modal-close" id="modal-close">×</button>
          </div>
          <div class="modal-body">
            <input type="text" id="group-name-input" placeholder="群聊名称" />
            <div class="member-checkbox-list">
              <label><input type="checkbox" value="codex" checked />Codex</label>
              <label><input type="checkbox" value="copilot" checked />Copilot</label>
              <label><input type="checkbox" value="gateway" checked />Gateway</label>
            </div>
          </div>
          <div class="modal-footer">
            <button class="modal-btn cancel" id="create-cancel">取消</button>
            <button class="modal-btn confirm" id="create-confirm">创建</button>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
