<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Here</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="im-app">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="user-avatar">
            <span class="avatar-text">M</span>
          </div>
          <div class="app-title">Chat Here</div>
        </header>

        <nav class="sidebar-tabs">
          <button class="tab-btn active" data-tab="chats">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
            <span>聊天</span>
          </button>
          <button class="tab-btn" data-tab="contacts">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span>联系人</span>
          </button>
          <button class="tab-btn" data-tab="history">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
            </svg>
            <span>历史</span>
          </button>
        </nav>

        <section class="session-list" id="session-list">
        </section>
      </aside>

      <section class="chat-main">
        <header class="chat-header" id="chat-header">
          <div class="header-info">
            <span class="header-title">架构讨论组</span>
            <span class="header-members">4人</span>
          </div>
          <div class="header-status">
            <span class="status-tag" id="codex-state">Codex Idle</span>
            <span class="status-tag" id="copilot-state">Copilot Idle</span>
            <span class="round-tag" id="round-badge">Round 0</span>
          </div>
        </header>

        <div class="chat-messages" id="chat-panel">
        </div>

        <footer class="chat-input">
          <div class="input-toolbar">
            <button class="tool-btn config-toggle" id="config-toggle" title="设置">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.07.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
              </svg>
            </button>
          </div>
          
          <div class="config-panel hidden" id="config-panel">
            <div class="config-row">
              <label>Codex Model</label>
              <select id="model-input"></select>
            </div>
            <div class="config-row">
              <label>Copilot Model</label>
              <select id="copilot-model-input"></select>
            </div>
            <div class="config-row">
              <label>轮次</label>
              <input id="round-input" type="number" min="1" max="5" value="1" />
            </div>
            <div class="config-auth">
              <button id="codex-auth-button" type="button">Codex 登录</button>
              <button id="copilot-auth-button" type="button">Copilot 登录</button>
            </div>
            <div class="config-status">
              <span id="provider-health">检查认证</span>
              <span id="status">Idle</span>
            </div>
          </div>

          <form id="task-form" class="input-form">
            <textarea id="task-input" rows="1" placeholder="输入消息..."></textarea>
            <button id="send-button" type="submit">发送</button>
          </form>
        </footer>
      </section>

      <aside class="detail-panel hidden" id="detail-panel">
        <header class="detail-header">
          <h2>群组详情</h2>
          <button class="close-btn" id="close-detail">×</button>
        </header>
        
        <section class="detail-section">
          <h3>成员</h3>
          <div class="member-list" id="member-list">
            <div class="member-row" data-member="me">
              <div class="member-avatar me">M</div>
              <div class="member-info">
                <span class="member-name">Me</span>
                <span class="member-role">用户</span>
              </div>
            </div>
            <div class="member-row" data-member="codex">
              <div class="member-avatar codex">C</div>
              <div class="member-info">
                <span class="member-name">Codex</span>
                <span class="member-role">Primary builder</span>
              </div>
            </div>
            <div class="member-row" data-member="copilot">
              <div class="member-avatar copilot">P</div>
              <div class="member-info">
                <span class="member-name">Copilot</span>
                <span class="member-role">Counterpoint reviewer</span>
              </div>
            </div>
            <div class="member-row" data-member="gateway">
              <div class="member-avatar gateway">G</div>
              <div class="member-info">
                <span class="member-name">Gateway</span>
                <span class="member-role">Turn manager</span>
              </div>
            </div>
          </div>
        </section>

        <section class="detail-section">
          <h3>运行进度</h3>
          <div class="progress-timeline">
            <div class="progress-item" id="timeline-dispatch">
              <span class="progress-dot"></span>
              <span class="progress-label">Dispatch</span>
              <span class="progress-status">Waiting</span>
            </div>
            <div class="progress-item" id="timeline-review">
              <span class="progress-dot"></span>
              <span class="progress-label">Group Chat</span>
              <span class="progress-status">Waiting</span>
            </div>
            <div class="progress-item" id="timeline-decision">
              <span class="progress-dot"></span>
              <span class="progress-label">Decision</span>
              <span class="progress-status">Waiting</span>
            </div>
          </div>
          <div class="summary-box" id="summary-text">
            Gateway 状态和决策将在此显示
          </div>
        </section>

        <section class="detail-section">
          <h3>历史记录</h3>
          <div class="history-list" id="history-list">
            <p class="empty-text">暂无历史</p>
          </div>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
