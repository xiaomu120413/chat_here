name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'chat_here/package-lock.json'
    
    - name: Install frontend dependencies
      run: cd chat_here && npm ci
    
    - name: Build frontend
      run: cd chat_here && npm run frontend:build --if-present
    
    - name: Run tests
      run: cd chat_here && npm test --if-present